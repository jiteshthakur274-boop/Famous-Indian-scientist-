<html>
<head>
<title>Famous Indian Scientists</title>
<style>
    body {
        font-family: sans-serif;
        margin: 0;
        box-sizing: border-box;
    }
    h1 {
        background-color: lightblue;
        text-align: center;
        padding: 1em;
    }
    .main {
        display: flex;
        justify-content: space-around;
        flex-wrap: wrap;
        padding: 20px;
    }
    .scientist-card {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 15px;
        margin: 10px;
        width: 300px;
        box-shadow: 0 4px 8px;
    }
    .scientist-card img {
        max-width: 100%;
        border-radius: 4px;
        height: 200px;
        object-fit: cover;
    }
</style>
</head>
<body>

    <h1>Famous Indian Scientists</h1>

    <div class="main">
        <div class="scientist-card">
            <img src="apj-abdul-kalam.jpg" alt="A.P.J. Abdul Kalam">
            <h2>A.P.J. Abdul Kalam</h2>
            <p>Contributions: Aerospace engineering, Missile technology</p>
        </div>

        <div class="scientist-card">
            <img src="cv-raman.jpg" alt="C. V. Raman">
            <h2>C. V. Raman</h2>
            <p>Contributions: Physics, Discovery of Raman Effect</p>
        </div>

        <div class="scientist-card">
            <img src="janaki-ammal.jpg" alt="Janaki Ammal">
            <h2>Janaki Ammal</h2>
            <p>Contributions: Botany, Cytogenetics and Plant Breeding</p>
        </div>
    </div>

</body>
</html>
